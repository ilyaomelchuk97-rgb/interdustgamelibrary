<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GameHub — Твоя общая библиотека</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Фоновый декор -->
    <div class="bg-decor">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-container">
        <!-- Шапка -->
        <header class="main-header">
            <div class="logo">
                <img src="img/app-logo.png" alt="GameHub Logo" class="logo-img">
            </div>
            <button id="refresh-btn" class="btn-icon" title="Обновить библиотеку">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
            </button>
        </header>

        <!-- Блок подключения аккаунтов -->
        <section class="auth-section" id="auth-section">
            <div class="auth-card steam-auth" id="steam-auth">
                <div class="auth-info">
                    <img src="img/steam-logo.webp" alt="Steam" class="store-logo">
                    <div class="auth-text">
                        <span class="auth-title">Steam</span>
                        <span class="auth-status" id="steam-status">Не подключен</span>
                    </div>
                </div>
                <button class="auth-btn" id="connect-steam">Подключить</button>
            </div>

            <div class="auth-card epic-auth" id="epic-auth">
                <div class="auth-info">
                    <img src="img/epic-logo.webp" alt="Epic" class="store-logo">
                    <div class="auth-text">
                        <span class="auth-title">Epic Games</span>
                        <span class="auth-status" id="epic-status">Не подключен</span>
                    </div>
                </div>
                <button class="auth-btn" id="connect-epic">Подключить</button>
            </div>
        </section>

        <!-- Фильтр -->
        <nav class="filter-nav">
            <div class="filter-slider"></div>
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="steam">Steam</button>
            <button class="filter-btn" data-filter="epic">Epic</button>
        </nav>

        <!-- Поиск -->
        <div class="search-box">
            <div class="search-icon">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </div>
            <input type="text" id="game-search" placeholder="Поиск по библиотеке..." autocomplete="off">
        </div>

        <!-- Сетка игр -->
        <main class="games-grid" id="games-grid">
            <!-- Сюда рендерятся карточки -->
        </main>
    </div>

    <!-- Уведомления (Тосты) -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Скрипты как модули -->
    <script type="module" src="js/app.js"></script>

</html>
